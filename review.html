<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Feedback - Celestial Wonders</title>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
  <style>
    body {font-family: Arial, sans-serif; margin:0; background:#0b0c10; color:#c5c6c7;}
    nav ul {list-style:none; text-align:center; background:#1f2833; padding:15px; margin:0;}
    nav ul li {display:inline-block; margin:0 25px;}
    nav ul li a {color:#66fcf1; text-decoration:none; font-weight:bold; font-size:18px;}
    nav ul li a:hover, nav ul li a.active {color:#c5c6c7; border-bottom:2px solid #66fcf1;}

    .feedback {padding:50px; text-align:center;}
    .feedback h1 {font-family:'Great Vibes', cursive; font-size:55px; color:#66fcf1; margin-bottom:30px;}

    form {max-width:500px; margin:0 auto; background:#1f2833; padding:30px; border-radius:10px; box-shadow:0 0 15px #45a29e;}
    label {display:block; text-align:left; margin-bottom:8px; font-weight:bold; color:#66fcf1;}
    input, textarea {
      width:100%; padding:10px; margin-bottom:20px;
      border:none; border-radius:5px;
      background:#0b0c10; color:#c5c6c7;
    }
    input:focus, textarea:focus {outline:2px solid #66fcf1;}
    button {
      background:#45a29e; color:#fff; padding:12px 20px;
      border:none; border-radius:5px; font-size:16px; cursor:pointer;
      transition:0.3s;
    }
    button:hover {background:#66fcf1; color:#0b0c10;}

    footer {background:#1f2833; color:#c5c6c7; text-align:center; padding:15px; margin-top:30px;}
  </style>
</head>
<body>
  <!-- Navbar -->
  <header>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="topics.html">Topics</a></li>
        <li><a href="testimonials.html">Testimonials</a></li>
        <li><a href="feedback.html" class="active">Review</a></li>
      </ul>
    </nav>
  </header>

  <!-- Feedback Section -->
  <section class="feedback">
    <h1>Share Your Feedback</h1>
    <form>
      <label for="name">Name</label>
      <input type="text" id="name" name="name" placeholder="Enter your name" required>

      <label for="email">Email</label>
      <input type="email" id="email" name="email" placeholder="Enter your email" required>

      <label for="message">Your Feedback</label>
      <textarea id="message" name="message" rows="5" placeholder="Write your feedback here..." required></textarea>

      <button type="submit">Submit</button>
    </form>
  </section>
  <section class="thankyou">
  <h1>Thank You!</h1>
  <p>Your feedback means the universe to us...</p>
  <a href="index.html">Back to Home</a>
</section>
  <!-- Footer -->
  <footer>
    <p>&copy; 2026 Celestial Wonders Project | Thank you for your valuable feedback!</p>
  </footer>
</body>
</html>
